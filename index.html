<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>両学長 Search</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f0b429">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="リベ大Search">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0d0d; --surface:#161616; --card:#1e1e1e; --card2:#242424;
  --gold:#f0b429; --gold-dim:#c49020; --red:#e84040; --green:#3ecf6e;
  --blue:#4a9eff; --purple:#a78bfa;
  --text:#f0f0f0; --muted:#888; --border:#2a2a2a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;}

/* HEADER */
header{
  background:var(--surface);border-bottom:2px solid var(--gold);
  padding:12px 20px;position:sticky;top:0;z-index:200;
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
}
.logo-main{font-family:'Oswald',sans-serif;font-size:20px;color:var(--gold);letter-spacing:3px;white-space:nowrap;}
.logo-sub{font-size:9px;color:var(--muted);letter-spacing:1px;}
.search-area{flex:1;min-width:200px;display:flex;flex-direction:column;gap:6px;}
.search-row{display:flex;gap:8px;align-items:center;}
.search-wrap{flex:1;position:relative;}
.search-wrap input{
  width:100%;background:var(--card);border:1px solid var(--border);
  border-radius:6px;padding:9px 36px 9px 12px;color:var(--text);
  font-size:13px;font-family:'Noto Sans JP',sans-serif;outline:none;transition:border-color .2s;
}
.search-wrap input:focus{border-color:var(--gold);}
.search-wrap .si{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;}
.search-opts{display:flex;gap:6px;align-items:center;font-size:11px;color:var(--muted);}
.mode-btn{
  background:var(--card);border:1px solid var(--border);border-radius:4px;
  padding:3px 10px;color:var(--muted);cursor:pointer;font-size:11px;
  font-family:'Noto Sans JP',sans-serif;transition:all .15s;
}
.mode-btn.active{background:var(--gold);border-color:var(--gold);color:#000;font-weight:700;}
.year-select,.sort-select{
  background:var(--card);border:1px solid var(--border);border-radius:6px;
  padding:9px 10px;color:var(--text);font-size:12px;
  font-family:'Noto Sans JP',sans-serif;outline:none;cursor:pointer;
}

/* PROGRESS */
.progress-section{
  background:#0a0a0a;border-bottom:1px solid var(--border);
  padding:10px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;
  position:sticky;z-index:150;
}
.progress-bar-wrap{flex:1;min-width:160px;}
.progress-label{font-size:11px;color:var(--muted);margin-bottom:4px;display:flex;justify-content:space-between;}
.progress-label strong{color:var(--green);}
.progress-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green),#22d3ee);border-radius:3px;transition:width .4s;}
.progress-stats{display:flex;gap:16px;font-size:11px;color:var(--muted);flex-wrap:wrap;}
.pstat strong{font-size:14px;}
.pstat.g strong{color:var(--green);}
.pstat.r strong{color:var(--red);}
.pstat.b strong{color:var(--blue);}
.pstat.p strong{color:var(--purple);}

/* TABS */
.tabs-wrap{padding:12px 20px 0;overflow-x:auto;scrollbar-width:none;position:sticky;z-index:140;background:var(--bg);}
.tabs-wrap::-webkit-scrollbar{display:none;}
.tabs{display:flex;gap:7px;min-width:max-content;}
.tab{
  background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:5px 14px;font-size:11px;color:var(--muted);cursor:pointer;
  transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:4px;
}
.tab:hover{border-color:#444;color:var(--text);}
.tab.active{background:var(--gold);border-color:var(--gold);color:#000;font-weight:700;}
.tab.t-fav.active{background:var(--red);border-color:var(--red);color:#fff;}
.tab.t-check.active{background:var(--green);border-color:var(--green);color:#000;}
.tab.t-later.active{background:var(--blue);border-color:var(--blue);color:#fff;}
.tab-badge{background:rgba(255,255,255,.18);border-radius:8px;padding:1px 6px;font-size:10px;font-weight:700;}
.tab.active .tab-badge{background:rgba(0,0,0,.2);}

/* GRID */
.grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(276px,1fr));
  gap:14px;padding:16px 20px 40px;
}

/* CARD */
.card{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  overflow:hidden;transition:transform .2s,border-color .2s,box-shadow .2s;
  animation:fadeIn .35s ease both;position:relative;
}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.5);}
.card.in-fav{border-color:rgba(232,64,64,.5);}
.card.in-check{border-color:rgba(62,207,110,.5);}
.card.in-later1{border-color:rgba(74,158,255,.35);}
.card.in-later2{border-color:rgba(74,158,255,.6);}
.card.in-later3{border-color:rgba(74,158,255,.9);}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* THUMB */
.thumb-wrap{position:relative;aspect-ratio:16/9;overflow:hidden;background:#111;cursor:pointer;}
.thumb-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .3s;}
.card:hover .thumb-wrap img{transform:scale(1.03);}
.duration{position:absolute;bottom:6px;right:8px;background:rgba(0,0,0,.88);color:#fff;font-size:10px;padding:2px 5px;border-radius:3px;font-weight:700;}
.play-overlay{position:absolute;inset:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;}
.thumb-wrap:hover .play-overlay{opacity:1;}
.play-btn{width:48px;height:48px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;color:#000;}

/* バッジ */
.badge-row{position:absolute;top:7px;left:7px;display:flex;gap:4px;flex-wrap:wrap;max-width:90%;}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;line-height:1.4;}
.badge-fav{background:var(--red);color:#fff;}
.badge-check{background:var(--green);color:#000;}
.badge-later{color:#fff;}
.badge-later.l1{background:#1a4a8a;}
.badge-later.l2{background:#1a5faa;}
.badge-later.l3{background:var(--blue);}

/* CARD BODY */
.card-body{padding:10px 13px 8px;}
.playlist-tag{display:inline-block;background:rgba(240,180,41,.1);color:var(--gold);font-size:10px;padding:2px 7px;border-radius:3px;margin-bottom:6px;font-weight:700;}
.card-title{font-size:12.5px;font-weight:700;line-height:1.5;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:var(--text);cursor:pointer;}
.card-title:hover{color:var(--gold);}
.card-meta{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:8px;}
.views::before{content:'▶ ';font-size:9px;color:var(--red);}

/* MEMO */
.memo-area{padding:0 13px 8px;}
.memo-input{
  width:100%;background:var(--card2);border:1px solid var(--border);
  border-radius:5px;padding:6px 8px;color:var(--text);font-size:11px;
  font-family:'Noto Sans JP',sans-serif;outline:none;resize:none;transition:border-color .2s;line-height:1.4;
}
.memo-input:focus{border-color:var(--purple);}
.memo-input::placeholder{color:#555;}
.tags-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
.tag{background:rgba(167,139,250,.15);color:var(--purple);border:1px solid rgba(167,139,250,.3);border-radius:12px;padding:2px 8px;font-size:10px;cursor:pointer;}
.tag:hover{background:rgba(167,139,250,.3);}
.tag-add{background:transparent;border:1px dashed #444;color:#555;border-radius:12px;padding:2px 8px;font-size:10px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
.tag-add:hover{border-color:var(--purple);color:var(--purple);}

/* ACTIONS */
.card-actions{display:flex;gap:6px;padding:0 13px 12px;flex-wrap:wrap;}
.action-btn{
  flex:1;min-width:0;display:flex;align-items:center;justify-content:center;gap:4px;
  padding:6px 4px;border-radius:5px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-size:10px;
  font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap;
}
.action-btn:hover{border-color:#444;color:var(--text);}
.btn-fav.on{background:rgba(232,64,64,.12);border-color:var(--red);color:var(--red);}
.btn-check.on{background:rgba(62,207,110,.12);border-color:var(--green);color:var(--green);}
.btn-later{position:relative;}
.btn-later.on1{background:rgba(74,158,255,.1);border-color:#2a6eaa;color:#4a9eff;}
.btn-later.on2{background:rgba(74,158,255,.18);border-color:#2a7fcc;color:#6ab4ff;}
.btn-later.on3{background:rgba(74,158,255,.28);border-color:var(--blue);color:#8dd0ff;}

/* LATER POPUP */
.later-popup{
  position:absolute;bottom:calc(100% + 4px);left:0;right:0;
  background:#1a1a2e;border:1px solid #2a4a7a;border-radius:6px;
  padding:6px;z-index:100;display:none;
}
.later-popup.show{display:block;}
.later-opt{padding:5px 8px;border-radius:4px;font-size:11px;cursor:pointer;color:var(--text);transition:background .15s;display:flex;align-items:center;gap:6px;}
.later-opt:hover{background:rgba(74,158,255,.15);}
.later-opt.active-opt{color:var(--blue);font-weight:700;}
.btn-return{background:rgba(255,255,255,.05);border-color:#444;color:#aaa;}
.btn-return:hover{background:rgba(255,255,255,.1);border-color:#666;color:#fff;}

mark{background:rgba(240,180,41,.25);color:var(--gold);border-radius:2px;padding:0 1px;}

.empty{text-align:center;padding:60px 24px;color:var(--muted);grid-column:1/-1;}
.empty .em{font-size:44px;margin-bottom:12px;}

/* NO DATA */
.no-data{
  margin:24px 20px;padding:18px 20px;
  background:#1a1200;border:1px solid #4a3200;border-radius:8px;
  font-size:13px;line-height:1.7;color:#c8a000;
}
.no-data code{background:#2a2000;padding:2px 7px;border-radius:4px;font-size:12px;font-family:monospace;}

/* LOADING */
.loading{
  text-align:center;padding:80px 24px;color:var(--muted);grid-column:1/-1;
}
.spinner{
  width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--gold);
  border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* PLAY-ALL BAR */
.playall-bar{
  display:flex;align-items:center;gap:10px;
  padding:8px 20px;background:#0a0a0a;border-bottom:1px solid var(--border);
  position:sticky;z-index:130;
}
.playall-btn{
  display:flex;align-items:center;gap:7px;
  background:var(--gold);color:#000;border:none;border-radius:20px;
  padding:6px 16px;font-size:12px;font-weight:700;
  font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:background .15s;
  white-space:nowrap;
}
.playall-btn:hover{background:#d4a020;}
.playall-count{font-size:11px;color:var(--muted);}

/* RESPONSIVE */
@media(max-width:600px){
  header{padding:10px 14px;}
  .grid{padding:12px 14px 32px;gap:10px;grid-template-columns:1fr;}
  .tabs-wrap{padding:10px 14px 0;}
  .progress-section{padding:8px 14px;}
}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo-main">両学長 SEARCH</div>
    <div class="logo-sub">リベ大動画を探す</div>
  </div>
  <div class="search-area">
    <div class="search-row">
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="キーワードで検索…（スペース区切りで複数入力）" oninput="render()">
        <span class="si">🔍</span>
      </div>
      <select class="year-select" id="yearSelect" onchange="render()">
        <option value="">すべての年</option>
      </select>
      <select class="sort-select" id="sortSelect" onchange="render()">
        <option value="date">新しい順</option>
        <option value="views">再生数順</option>
        <option value="title">タイトル順</option>
      </select>
    </div>
    <div class="search-opts">
      検索モード：
      <button class="mode-btn active" id="modeAND" onclick="setMode('AND')">AND</button>
      <button class="mode-btn" id="modeOR"  onclick="setMode('OR')">OR</button>
      <span id="modeHint" style="color:#555">すべてのキーワードを含む</span>
    </div>
  </div>
</header>

<div class="progress-section">
  <div class="progress-bar-wrap">
    <div class="progress-label"><span>視聴進捗</span><strong id="pctLabel">0%</strong></div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
  <div class="progress-stats">
    <div class="pstat g"><strong id="cntCheck">0</strong> 視聴済</div>
    <div class="pstat r"><strong id="cntFav">0</strong> お気に入り</div>
    <div class="pstat b"><strong id="cntLater">0</strong> あとで見る</div>
    <div class="pstat p"><strong id="cntTotal">0</strong> 総動画</div>
  </div>
</div>

<div class="tabs-wrap"><div class="tabs" id="tabs"></div></div>
<div class="playall-bar" id="playallBar" style="display:none">
  <button class="playall-btn" onclick="playAll()">▶ 連続再生</button>
  <span class="playall-count" id="playallCount"></span>
</div>
<div id="noBanner" style="display:none"></div>
<div class="grid" id="grid"></div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
const SPECIAL = ['❤️ お気に入り', '✅ 視聴済', '🔖 あとで見る'];
const STORAGE_KEY = 'riberyu_yt_v2';

let VIDEOS = [];         // loaded from data.json
let PLAYLISTS = [];      // ['すべて', ...playlist titles]
let PLAYLISTS_META = []; // [{id, title}, ...]

const S = {
  favs:    {},
  checked: {},
  later:   {},  // {id: 1|2|3}
  memos:   {},
  tags:    {},
  mode:    'AND',
  tab:     'すべて'
};

// ─── LocalStorage ─────────────────────────────────────────────────────────────
function saveLS() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    favs:    S.favs,
    checked: S.checked,
    later:   S.later,
    memos:   S.memos,
    tags:    S.tags
  }));
}
function loadLS() {
  try {
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    S.favs    = d.favs    || {};
    S.checked = d.checked || {};
    S.later   = d.later   || {};
    S.memos   = d.memos   || {};
    S.tags    = d.tags    || {};
  } catch(e) {}
}

// ─── Load data.json ───────────────────────────────────────────────────────────
async function loadData() {
  try {
    const res = await fetch('data.json');
    const data = await res.json();
    VIDEOS = data.videos || [];

    // Build playlist list
    const seen = new Set();
    const pls = [];
    for (const v of VIDEOS) {
      for (const p of (v.playlists || [])) {
        if (!seen.has(p.id)) { seen.add(p.id); pls.push(p.title); }
      }
    }
    // Also use top-level playlists if provided
    if ((data.playlists || []).length > 0) {
      PLAYLISTS_META = data.playlists;
      PLAYLISTS = ['すべて', ...data.playlists.map(p => p.title)];
    } else if (pls.length > 0) {
      PLAYLISTS = ['すべて', ...pls];
    } else {
      PLAYLISTS = ['すべて'];
    }

    // Normalize: add .playlist (first playlist title or '') and .date
    for (const v of VIDEOS) {
      v.playlist = (v.playlists && v.playlists.length > 0) ? v.playlists[0].title : '';
      v.date     = (v.publishedAt || '').slice(0, 10);
    }
  } catch(e) {
    VIDEOS = [];
    PLAYLISTS = ['すべて'];
  }
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function fmt(n) {
  if (!n) return '---';
  if (n >= 100000000) return (n/100000000).toFixed(1) + '億回';
  if (n >= 10000)     return Math.floor(n/10000) + '万回';
  return n.toLocaleString() + '回';
}
function fmtDate(s) {
  if (!s) return '';
  const d = new Date(s);
  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
}
function fmtDuration(iso) {
  if (!iso) return '';
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return '';
  const h = parseInt(m[1]||0), min = parseInt(m[2]||0), s = parseInt(m[3]||0);
  if (h > 0) return `${h}:${String(min).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${min}:${String(s).padStart(2,'0')}`;
}
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escJs(s) {
  return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
}
function highlight(text, kws) {
  if (!kws.length) return escHtml(text);
  const escaped = kws.map(k => k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'));
  const re = new RegExp('(' + escaped.join('|') + ')', 'gi');
  return escHtml(text).replace(re, '<mark>$1</mark>');
}

// ─── Search mode ──────────────────────────────────────────────────────────────
function setMode(m) {
  S.mode = m;
  document.getElementById('modeAND').classList.toggle('active', m==='AND');
  document.getElementById('modeOR').classList.toggle('active',  m==='OR');
  document.getElementById('modeHint').textContent = m==='AND'
    ? 'すべてのキーワードを含む' : 'いずれかのキーワードを含む';
  render();
}

// ─── あとで見るポップアップ ────────────────────────────────────────────────────
let openPopup = null;
function toggleLaterPopup(id, el) {
  const p = el.querySelector('.later-popup');
  if (openPopup && openPopup !== p) openPopup.classList.remove('show');
  p.classList.toggle('show');
  openPopup = p.classList.contains('show') ? p : null;
}
function setLater(id, level) {
  if (S.later[id] === level) delete S.later[id];
  else S.later[id] = level;
  if (openPopup) { openPopup.classList.remove('show'); openPopup = null; }
  saveLS();
  render();
}
document.addEventListener('click', e => {
  if (!e.target.closest('.btn-later') && openPopup) {
    openPopup.classList.remove('show'); openPopup = null;
  }
});

// ─── Memo / Tag ───────────────────────────────────────────────────────────────
function saveMemo(id, val) {
  if (val.trim()) S.memos[id] = val;
  else delete S.memos[id];
  saveLS();
}
function addTag(id) {
  const t = prompt('タグを入力（例：超重要・復習済）');
  if (!t || !t.trim()) return;
  if (!S.tags[id]) S.tags[id] = [];
  if (!S.tags[id].includes(t.trim())) S.tags[id].push(t.trim());
  saveLS();
  render();
}
function removeTag(id, t) {
  S.tags[id] = (S.tags[id] || []).filter(x => x !== t);
  saveLS();
  render();
}

// ─── Filter / Sort ────────────────────────────────────────────────────────────
function getItems() {
  const kw  = document.getElementById('searchInput').value.trim();
  const kws = kw ? kw.split(/\s+/).filter(Boolean) : [];
  const year = document.getElementById('yearSelect').value;
  const sort = document.getElementById('sortSelect').value;

  let items = VIDEOS.filter(v => {
    if (S.tab === '❤️ お気に入り') return !!S.favs[v.id];
    if (S.tab === '✅ 視聴済')     return !!S.checked[v.id];
    if (S.tab === '🔖 あとで見る') return !!S.later[v.id];

    // 通常タブ：視聴済・お気に入りは除外（あとで見るは残す）
    if (S.checked[v.id] || S.favs[v.id]) return false;

    const matchPL = S.tab === 'すべて' || v.playlist === S.tab;
    if (!matchPL) return false;
    if (year && !v.date.startsWith(year)) return false;
    if (kws.length) {
      const text = v.title + ' ' + v.playlist + ' ' + (S.tags[v.id]||[]).join(' ');
      return S.mode === 'AND'
        ? kws.every(k => text.includes(k))
        : kws.some(k  => text.includes(k));
    }
    return true;
  });

  // 専用タブでもキーワード・年フィルタ適用
  if (SPECIAL.includes(S.tab)) {
    if (kws.length) items = items.filter(v => {
      const text = v.title + ' ' + v.playlist + ' ' + (S.tags[v.id]||[]).join(' ');
      return S.mode === 'AND' ? kws.every(k => text.includes(k)) : kws.some(k => text.includes(k));
    });
    if (year) items = items.filter(v => v.date.startsWith(year));
  }

  if (sort === 'views') items.sort((a,b) => (b.viewCount||0)-(a.viewCount||0));
  else if (sort === 'date') items.sort((a,b) => new Date(b.date)-new Date(a.date));
  else items.sort((a,b) => (a.title||'').localeCompare(b.title||'','ja'));

  return { items, kws };
}

// ─── Card ─────────────────────────────────────────────────────────────────────
function makeCard(v, i, kws) {
  const isF     = !!S.favs[v.id];
  const isC     = !!S.checked[v.id];
  const laterLv = S.later[v.id] || 0;
  const memo    = S.memos[v.id] || '';
  const tags    = S.tags[v.id]  || [];
  const dur     = fmtDuration(v.duration);
  const thumb   = v.thumbnail || `https://i.ytimg.com/vi/${v.id}/mqdefault.jpg`;

  let cardExtra = '';
  if (S.tab === '❤️ お気に入り') cardExtra = 'in-fav';
  else if (S.tab === '✅ 視聴済') cardExtra = 'in-check';
  else if (S.tab === '🔖 あとで見る') cardExtra = `in-later${laterLv}`;

  const laterBtnCls  = laterLv ? `btn-later on${laterLv}` : 'btn-later';
  const laterLabel   = ['','🔖 低優先','🔖 中優先','🔖 高優先'][laterLv] || '🔖 あとで見る';
  const laterBadgeL  = ['','低優先','中優先','高優先'][laterLv] || '';

  const vid = escJs(v.id);

  return `
<div class="card ${cardExtra}" style="animation-delay:${i*25}ms">
  <div class="badge-row">
    ${isF ? '<span class="badge badge-fav">❤️ お気に入り</span>' : ''}
    ${isC ? '<span class="badge badge-check">✅ 視聴済</span>' : ''}
    ${laterLv ? `<span class="badge badge-later l${laterLv}">${laterBadgeL}</span>` : ''}
  </div>
  <div class="thumb-wrap" onclick="window.open('https://www.youtube.com/watch?v=${vid}','_blank')">
    <img src="${escHtml(thumb)}" alt="" loading="lazy"
      onerror="this.src='https://i.ytimg.com/vi/${vid}/mqdefault.jpg'">
    <div class="play-overlay"><div class="play-btn">▶</div></div>
    ${dur ? `<div class="duration">${escHtml(dur)}</div>` : ''}
  </div>
  <div class="card-body">
    ${v.playlist ? `<div class="playlist-tag">${escHtml(v.playlist)}</div>` : ''}
    <div class="card-title" onclick="window.open('https://www.youtube.com/watch?v=${vid}','_blank')">${highlight(v.title, kws)}</div>
    <div class="card-meta">
      <span class="views">${fmt(v.viewCount)}</span>
      <span>${fmtDate(v.date)}</span>
    </div>
  </div>
  <div class="memo-area">
    <textarea class="memo-input" rows="2" placeholder="メモを残す…"
      onchange="saveMemo('${vid}',this.value)">${escHtml(memo)}</textarea>
    <div class="tags-row">
      ${tags.map(t=>`<span class="tag" onclick="removeTag('${vid}','${escJs(t)}')">🏷 ${escHtml(t)} ✕</span>`).join('')}
      <button class="tag-add" onclick="addTag('${vid}')">＋ タグ追加</button>
    </div>
  </div>
  <div class="card-actions">
    <button class="action-btn btn-check ${isC?'on':''}" onclick="toggle('check','${vid}')">
      ${isC ? '✅ 視聴済に戻す' : '☐ 視聴済にする'}
    </button>
    <button class="action-btn btn-fav ${isF?'on':''}" onclick="toggle('fav','${vid}')">
      ${isF ? '❤️ 戻す' : '🤍 お気に入り'}
    </button>
    <button class="action-btn ${laterBtnCls}" onclick="toggleLaterPopup('${vid}',this)">
      ${laterLabel}
      <div class="later-popup" onclick="event.stopPropagation()">
        <div class="later-opt ${laterLv===1?'active-opt':''}" onclick="setLater('${vid}',1)">🔖 低優先（いつか）</div>
        <div class="later-opt ${laterLv===2?'active-opt':''}" onclick="setLater('${vid}',2)">🔖 中優先（今週）</div>
        <div class="later-opt ${laterLv===3?'active-opt':''}" onclick="setLater('${vid}',3)">🔖 高優先（今日）</div>
        ${laterLv ? `<div class="later-opt" onclick="setLater('${vid}',${laterLv})">✕ 解除</div>` : ''}
      </div>
    </button>
  </div>
</div>`;
}

// ─── Tabs ─────────────────────────────────────────────────────────────────────
function renderTabs() {
  const favCnt   = Object.keys(S.favs).length;
  const checkCnt = Object.keys(S.checked).length;
  const laterCnt = Object.keys(S.later).length;
  const all = [...PLAYLISTS, ...SPECIAL];

  document.getElementById('tabs').innerHTML = all.map(p => {
    let badge = '';
    if (p === '❤️ お気に入り' && favCnt)   badge = `<span class="tab-badge">${favCnt}</span>`;
    if (p === '✅ 視聴済'     && checkCnt) badge = `<span class="tab-badge">${checkCnt}</span>`;
    if (p === '🔖 あとで見る' && laterCnt) badge = `<span class="tab-badge">${laterCnt}</span>`;
    const cls = ['tab',
      p === '❤️ お気に入り' ? 't-fav'   : '',
      p === '✅ 視聴済'     ? 't-check' : '',
      p === '🔖 あとで見る' ? 't-later' : '',
      p === S.tab           ? 'active'  : ''
    ].filter(Boolean).join(' ');
    return `<div class="${cls}" onclick="setTab('${escJs(p)}')">${escHtml(p)}${badge}</div>`;
  }).join('');
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  const { items, kws } = getItems();
  const total    = VIDEOS.length;
  const checkCnt = Object.keys(S.checked).length;
  const pct      = total > 0 ? Math.round(checkCnt / total * 100) : 0;

  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('pctLabel').textContent     = pct + '%';
  document.getElementById('cntCheck').textContent     = checkCnt;
  document.getElementById('cntFav').textContent       = Object.keys(S.favs).length;
  document.getElementById('cntLater').textContent     = Object.keys(S.later).length;
  document.getElementById('cntTotal').textContent     = total;

  renderTabs();
  renderPlayAllBar(items);

  if (!items.length) {
    const isNormal = !SPECIAL.includes(S.tab);
    const msg = S.tab === '❤️ お気に入り' ? 'お気に入りはまだありません' :
                S.tab === '✅ 視聴済'     ? '視聴済の動画がありません' :
                S.tab === '🔖 あとで見る' ? 'あとで見るリストが空です' :
                isNormal ? 'すべて視聴済 or お気に入り済かも👏' : '該当動画なし';
    const em = S.tab === '❤️ お気に入り' ? '❤️' :
               S.tab === '✅ 視聴済'     ? '✅' :
               S.tab === '🔖 あとで見る' ? '🔖' : '🎉';
    document.getElementById('grid').innerHTML =
      `<div class="empty"><div class="em">${em}</div><div>${msg}</div></div>`;
    return;
  }
  document.getElementById('grid').innerHTML = items.map((v, i) => makeCard(v, i, kws)).join('');
}

// ─── Toggle ───────────────────────────────────────────────────────────────────
function toggle(type, id) {
  if (type === 'fav')   { if (S.favs[id])    delete S.favs[id];    else S.favs[id]    = true; }
  if (type === 'check') { if (S.checked[id]) delete S.checked[id]; else S.checked[id] = true; }
  saveLS();
  render();
}

function setTab(p) { S.tab = p; render(); }

// ─── 連続再生 ─────────────────────────────────────────────────────────────────
function playAll() {
  const { items } = getItems();
  if (!items.length) return;

  const year    = document.getElementById('yearSelect').value;
  const keyword = document.getElementById('searchInput').value.trim();
  const filtered = year || keyword; // 絞り込みが入っているか

  // プレイリストタブ かつ 絞り込みなし → YouTube 公式プレイリストをそのまま開く
  if (!SPECIAL.includes(S.tab) && S.tab !== 'すべて' && !filtered) {
    const pl = PLAYLISTS_META.find(p => p.title === S.tab);
    if (pl) {
      window.open(`https://www.youtube.com/playlist?list=${pl.id}`, '_blank');
      return;
    }
  }

  // 年・キーワード絞り込みあり or すべてタブ → 表示中の動画を連続再生（最大50本）
  const ids = items.slice(0, 50).map(v => v.id).join(',');
  window.open(`https://www.youtube.com/watch_videos?video_ids=${ids}`, '_blank');
}

function renderPlayAllBar(items) {
  const bar = document.getElementById('playallBar');
  if (!items.length || SPECIAL.includes(S.tab)) {
    bar.style.display = 'none';
    return;
  }
  bar.style.display = 'flex';

  const year     = document.getElementById('yearSelect').value;
  const keyword  = document.getElementById('searchInput').value.trim();
  const filtered = year || keyword;
  const isFullPlaylist = !SPECIAL.includes(S.tab) && S.tab !== 'すべて' && !filtered;

  const shown = Math.min(items.length, 50);
  const over  = items.length > 50 ? `（先頭50本）` : '';
  const count = isFullPlaylist
    ? `全${items.length}本`
    : `${year ? year + '年 ' : ''}${shown}本${over}`;
  document.getElementById('playallCount').textContent = count;
}

// ─── Init ─────────────────────────────────────────────────────────────────────
(async () => {
  loadLS();

  // Loading state
  document.getElementById('grid').innerHTML = `<div class="loading"><div class="spinner"></div>動画データを読み込み中...</div>`;

  await loadData();

  if (VIDEOS.length === 0) {
    document.getElementById('grid').innerHTML = '';
    document.getElementById('noBanner').style.display = 'block';
    document.getElementById('noBanner').innerHTML = `
      <div class="no-data">
        ⚠️ <strong>data.json に動画データがありません。</strong><br>
        以下の手順で動画データを取得してください：<br>
        1. <code>cp .env.example .env</code> して API キーを設定<br>
        2. <code>npm install</code><br>
        3. <code>node fetch-videos.js</code> を実行 → data.json が生成される<br>
        4. data.json をコミット &amp; プッシュ → GitHub Pages に反映
      </div>`;
    renderTabs();
    return;
  }

  // Populate year filter
  const years = [...new Set(VIDEOS.map(v => v.date.slice(0,4)).filter(Boolean))].sort((a,b)=>b-a);
  const sel = document.getElementById('yearSelect');
  years.forEach(y => {
    const o = document.createElement('option'); o.value = y; o.textContent = y + '年';
    sel.appendChild(o);
  });

  render();
  updateStickyTops();
})();

// ─── Sticky offset 計算（ヘッダー高さに合わせてずれなく固定） ─────────────────
function updateStickyTops() {
  const headerH   = document.querySelector('header').offsetHeight;
  const progressEl = document.querySelector('.progress-section');
  const tabsEl     = document.querySelector('.tabs-wrap');
  const playallEl  = document.querySelector('.playall-bar');

  progressEl.style.top = headerH + 'px';
  const progressH = progressEl.offsetHeight;

  tabsEl.style.top = (headerH + progressH) + 'px';
  const tabsH = tabsEl.offsetHeight;

  playallEl.style.top = (headerH + progressH + tabsH) + 'px';
}

window.addEventListener('resize', updateStickyTops);

// Service Worker 登録（PWA対応）
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
