<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>リベ大 YouTube検索</title>
  <style>
    :root {
      --primary: #ff6b35;
      --primary-dark: #e55a28;
      --primary-light: rgba(255,107,53,0.1);
      --secondary: #1a1a2e;
      --bg: #f0f2f5;
      --card-bg: #ffffff;
      --border: #e1e4e8;
      --text-primary: #1a1a2e;
      --text-secondary: #555;
      --text-muted: #999;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-hover: 0 8px 24px rgba(0,0,0,0.14);
      --radius: 12px;
      --radius-sm: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN',
        'Yu Gothic', 'Meiryo', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: var(--secondary);
      color: white;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 200;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }

    .header-logo {
      font-size: 18px;
      font-weight: 800;
      white-space: nowrap;
      letter-spacing: -0.3px;
    }
    .header-logo .accent { color: var(--primary); }

    .search-wrapper {
      flex: 1;
      display: flex;
      gap: 8px;
      max-width: 640px;
    }

    .search-input {
      flex: 1;
      padding: 9px 16px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      background: rgba(255,255,255,0.12);
      color: white;
      outline: none;
      transition: background 0.2s;
    }
    .search-input::placeholder { color: rgba(255,255,255,0.45); }
    .search-input:focus { background: rgba(255,255,255,0.22); }

    .mode-toggle {
      display: flex;
      background: rgba(255,255,255,0.1);
      border-radius: var(--radius-sm);
      overflow: hidden;
      flex-shrink: 0;
    }
    .mode-btn {
      padding: 9px 13px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }
    .mode-btn.active {
      background: var(--primary);
      color: white;
    }

    /* ── Controls ── */
    .controls {
      background: white;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 53px;
      z-index: 100;
    }

    .tabs-row {
      display: flex;
      gap: 0;
      overflow-x: auto;
      scrollbar-width: none;
      padding: 0 24px;
    }
    .tabs-row::-webkit-scrollbar { display: none; }

    .tab {
      padding: 14px 16px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      white-space: nowrap;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }
    .tab:hover { color: var(--primary); }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 700; }

    .filters-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 24px 12px;
      flex-wrap: wrap;
    }

    .filter-select {
      padding: 7px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13px;
      background: white;
      color: var(--text-primary);
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }
    .filter-select:focus { border-color: var(--primary); }

    .result-count {
      margin-left: auto;
      font-size: 13px;
      color: var(--text-muted);
    }

    /* ── Progress ── */
    .progress-bar-container {
      background: white;
      padding: 9px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .progress-label {
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .progress-track {
      flex: 1;
      height: 7px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      max-width: 280px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), #ffb347);
      border-radius: 4px;
      transition: width 0.4s ease;
    }

    .progress-pct {
      font-size: 13px;
      font-weight: 700;
      color: var(--primary);
      min-width: 38px;
    }

    /* ── Main ── */
    .main {
      padding: 24px;
      max-width: 1440px;
      margin: 0 auto;
    }

    /* ── Grid ── */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    /* ── Card ── */
    .video-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
    }
    .video-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .thumb-wrap {
      position: relative;
      padding-top: 56.25%;
      overflow: hidden;
      background: #111;
      cursor: pointer;
    }
    .thumb-wrap:hover .thumb-overlay { opacity: 1; }

    .thumb-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s;
    }
    .video-card:hover .thumb-img { transform: scale(1.04); }

    .thumb-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .play-icon {
      width: 52px;
      height: 52px;
      background: rgba(255,255,255,0.9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      padding-left: 4px;
    }

    .duration-badge {
      position: absolute;
      bottom: 6px;
      right: 6px;
      background: rgba(0,0,0,0.82);
      color: white;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 0.3px;
    }

    .watch-later-badge {
      position: absolute;
      top: 7px;
      left: 7px;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 5px;
    }
    .watch-later-badge.low  { background: #e3f2fd; color: #1565c0; }
    .watch-later-badge.medium { background: #fff3e0; color: #e65100; }
    .watch-later-badge.high { background: #fce4ec; color: #c62828; }

    .card-body {
      padding: 12px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .video-title {
      font-size: 13.5px;
      font-weight: 600;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .video-meta {
      display: flex;
      gap: 10px;
      font-size: 12px;
      color: var(--text-muted);
      flex-wrap: wrap;
    }
    .meta-icon { margin-right: 2px; }

    .playlist-chip {
      display: inline-block;
      font-size: 11px;
      color: var(--primary);
      background: var(--primary-light);
      padding: 2px 8px;
      border-radius: 4px;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .tag-chip {
      font-size: 11px;
      background: #f0f2f5;
      color: var(--text-secondary);
      padding: 2px 8px;
      border-radius: 12px;
    }

    .note-preview {
      font-size: 12px;
      color: var(--text-secondary);
      background: #fafafa;
      border-left: 3px solid var(--primary);
      padding: 5px 8px;
      border-radius: 0 6px 6px 0;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-actions {
      display: flex;
      gap: 5px;
      margin-top: auto;
      padding-top: 4px;
    }

    .action-btn {
      flex: 1;
      padding: 6px 6px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: white;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.18s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      white-space: nowrap;
    }
    .action-btn:hover { background: #f5f5f5; }
    .action-btn.fav-on  { background: #fce4ec; border-color: #e91e63; color: #c2185b; }
    .action-btn.watch-on { background: #e8f5e9; border-color: #4caf50; color: #2e7d32; }

    .wl-select {
      flex: 1.2;
      padding: 6px 6px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 12px;
      background: white;
      cursor: pointer;
      outline: none;
      transition: border-color 0.18s;
    }
    .wl-select:focus { border-color: var(--primary); }
    .wl-select.wl-set { border-color: #2196f3; color: #1565c0; background: #e3f2fd; }

    /* ── Loading / Empty ── */
    .loading, .empty-state {
      text-align: center;
      padding: 80px 24px;
      color: var(--text-muted);
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-icon { font-size: 52px; margin-bottom: 16px; }
    .empty-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
    .empty-sub { font-size: 13px; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(3px);
    }
    .modal {
      background: white;
      border-radius: var(--radius);
      width: 100%;
      max-width: 540px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 24px 72px rgba(0,0,0,0.3);
      animation: slideUp 0.2s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .modal-header {
      padding: 20px 20px 16px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }
    .modal-title {
      flex: 1;
      font-size: 14px;
      font-weight: 600;
      line-height: 1.45;
    }
    .modal-close {
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: var(--text-muted);
      line-height: 1;
      padding: 0;
      flex-shrink: 0;
    }
    .modal-close:hover { color: var(--text-primary); }
    .modal-body { padding: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 7px;
    }
    .form-textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
      min-height: 90px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-textarea:focus { border-color: var(--primary); }
    .form-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--primary); }
    .modal-footer {
      padding: 14px 20px;
      display: flex;
      gap: 8px;
      border-top: 1px solid var(--border);
    }
    .btn {
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.18s;
    }
    .btn-primary { background: var(--primary); color: white; flex: 1; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary { background: #eee; color: var(--text-secondary); }
    .btn-secondary:hover { background: #ddd; }

    /* ── No data banner ── */
    .no-data-banner {
      background: #fff3cd;
      border: 1px solid #ffecb5;
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 24px;
      font-size: 14px;
      line-height: 1.6;
    }
    .no-data-banner code {
      background: #e9ecef;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 13px;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .header { flex-wrap: wrap; padding: 12px 16px; gap: 10px; }
      .header-logo { font-size: 16px; }
      .search-wrapper { width: 100%; max-width: none; }
      .main { padding: 16px; }
      .video-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
      .controls { top: 86px; }
      .tabs-row { padding: 0 16px; }
      .filters-row { padding: 8px 16px 10px; }
      .progress-bar-container { padding: 8px 16px; }
    }
    @media (max-width: 480px) {
      .video-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-logo">📚 <span class="accent">リベ大</span> YouTube検索</div>
  <div class="search-wrapper">
    <input type="text" id="searchInput" class="search-input"
      placeholder="キーワード検索（スペース区切りで複数可）">
    <div class="mode-toggle">
      <button class="mode-btn active" id="andBtn" onclick="setMode('AND')">AND</button>
      <button class="mode-btn"        id="orBtn"  onclick="setMode('OR')">OR</button>
    </div>
  </div>
</header>

<!-- Controls -->
<div class="controls">
  <div class="tabs-row" id="tabsRow"></div>
  <div class="filters-row">
    <select id="yearFilter" class="filter-select" onchange="state.yearFilter=this.value; render()">
      <option value="all">すべての年</option>
    </select>
    <select id="sortBy" class="filter-select" onchange="state.sortBy=this.value; render()">
      <option value="newest">新しい順</option>
      <option value="oldest">古い順</option>
      <option value="views">再生数順</option>
      <option value="title">タイトル順</option>
    </select>
    <div class="result-count" id="resultCount"></div>
  </div>
</div>

<!-- Progress bar -->
<div class="progress-bar-container">
  <div class="progress-label" id="progressLabel">視聴進捗: 0 / 0</div>
  <div class="progress-track">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
  <div class="progress-pct" id="progressPct">0%</div>
</div>

<!-- Main -->
<main class="main">
  <div id="loadingEl" class="loading">
    <div class="loading-spinner"></div>
    動画データを読み込み中...
  </div>
  <div id="noBanner" class="no-data-banner" style="display:none">
    ⚠️ <strong>data.json が空です。</strong><br>
    <code>node fetch-videos.js</code> を実行して動画データを取得してください。<br>
    （YouTube API キーが必要です。<code>.env</code> に <code>YOUTUBE_API_KEY=xxx</code> を設定してください）
  </div>
  <div id="videoGrid" class="video-grid" style="display:none"></div>
  <div id="emptyState" class="empty-state" style="display:none">
    <div class="empty-icon">🔍</div>
    <div class="empty-title">動画が見つかりませんでした</div>
    <div class="empty-sub">検索条件を変えてみてください</div>
  </div>
</main>

<!-- Note/Tag Modal -->
<div class="modal-overlay" id="modalOverlay" style="display:none">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">📝 メモ</label>
        <textarea id="noteInput" class="form-textarea" placeholder="メモを入力..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">🏷️ タグ（スペース区切り）</label>
        <input type="text" id="tagInput" class="form-input" placeholder="例: 節税 投資 不動産">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveNoteAndTags()">保存</button>
    </div>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let videos = [];
let allPlaylists = [];
let modalVideoId = null;

const state = {
  activeTab: 'all',
  searchQuery: '',
  searchMode: 'AND',
  yearFilter: 'all',
  sortBy: 'newest',
  watched:    {},
  favorites:  {},
  watchLater: {},
  notes:      {},
  tags:       {}
};

const STORAGE_KEY = 'riberyu_yt_state';

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    state.watched    = s.watched    || {};
    state.favorites  = s.favorites  || {};
    state.watchLater = s.watchLater || {};
    state.notes      = s.notes      || {};
    state.tags       = s.tags       || {};
  } catch(e) {}
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    watched:    state.watched,
    favorites:  state.favorites,
    watchLater: state.watchLater,
    notes:      state.notes,
    tags:       state.tags
  }));
}

// ─── Data Loading ─────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const res = await fetch('data.json');
    const data = await res.json();
    videos = data.videos || [];
    allPlaylists = data.playlists || [];

    // If no playlists from data.json, derive from video.playlists arrays
    if (allPlaylists.length === 0) {
      const map = {};
      for (const v of videos) {
        for (const p of (v.playlists || [])) {
          if (!map[p.id]) map[p.id] = p.title;
        }
      }
      allPlaylists = Object.entries(map).map(([id, title]) => ({ id, title }));
    }
  } catch(e) {
    videos = [];
    allPlaylists = [];
  }
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function formatViews(n) {
  if (n == null || n === 0) return '---';
  if (n >= 100000000) return (n / 100000000).toFixed(1) + '億回';
  if (n >= 10000)     return Math.floor(n / 10000) + '万回';
  return n.toLocaleString() + '回';
}

function formatDate(s) {
  if (!s) return '';
  const d = new Date(s);
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

function formatDuration(iso) {
  if (!iso) return '';
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return '';
  const h = parseInt(m[1]||0), min = parseInt(m[2]||0), s = parseInt(m[3]||0);
  if (h > 0) return `${h}:${String(min).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${min}:${String(s).padStart(2,'0')}`;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Filtering / Sorting ──────────────────────────────────────────────────────
function getFiltered() {
  let result = videos.filter(v => {
    const isWatched  = !!state.watched[v.id];
    const isFav      = !!state.favorites[v.id];

    if (state.activeTab === 'watched')   return isWatched;
    if (state.activeTab === 'favorites') return isFav;

    // Main tabs: exclude watched and favorited
    if (isWatched || isFav) return false;

    // Playlist tab
    if (state.activeTab !== 'all') {
      const hasPlaylist = (v.playlists||[]).some(p => p.id === state.activeTab);
      if (!hasPlaylist) return false;
    }

    // Year
    if (state.yearFilter !== 'all') {
      if (new Date(v.publishedAt).getFullYear().toString() !== state.yearFilter) return false;
    }

    // Search
    if (state.searchQuery.trim()) {
      const kws = state.searchQuery.trim().toLowerCase().split(/\s+/).filter(Boolean);
      const corpus = [v.title, v.description||'', ...(state.tags[v.id]||[])].join(' ').toLowerCase();
      if (state.searchMode === 'AND') {
        if (!kws.every(k => corpus.includes(k))) return false;
      } else {
        if (!kws.some(k => corpus.includes(k))) return false;
      }
    }

    return true;
  });

  result.sort((a, b) => {
    switch (state.sortBy) {
      case 'newest': return new Date(b.publishedAt) - new Date(a.publishedAt);
      case 'oldest': return new Date(a.publishedAt) - new Date(b.publishedAt);
      case 'views':  return (b.viewCount||0) - (a.viewCount||0);
      case 'title':  return (a.title||'').localeCompare(b.title||'', 'ja');
    }
    return 0;
  });

  return result;
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  renderTabs();
  renderProgress();
  const filtered = getFiltered();
  renderGrid(filtered);
  document.getElementById('resultCount').textContent = `${filtered.length.toLocaleString()}件`;
}

function renderTabs() {
  const row = document.getElementById('tabsRow');
  const tabs = [
    { id: 'all', label: 'すべて' },
    ...allPlaylists.map(p => ({ id: p.id, label: p.title })),
    { id: 'watched',   label: `✅ 視聴済 (${Object.keys(state.watched).length})` },
    { id: 'favorites', label: `❤️ お気に入り (${Object.keys(state.favorites).length})` }
  ];
  row.innerHTML = tabs.map(t =>
    `<button class="tab${state.activeTab===t.id?' active':''}" onclick="setTab('${t.id}')">${esc(t.label)}</button>`
  ).join('');
}

function renderProgress() {
  const total   = videos.length;
  const watched = Object.keys(state.watched).length;
  const pct     = total > 0 ? Math.round(watched / total * 100) : 0;
  document.getElementById('progressLabel').textContent = `視聴進捗: ${watched.toLocaleString()} / ${total.toLocaleString()}`;
  document.getElementById('progressFill').style.width  = pct + '%';
  document.getElementById('progressPct').textContent   = pct + '%';
}

function renderGrid(filtered) {
  const grid    = document.getElementById('videoGrid');
  const empty   = document.getElementById('emptyState');
  const loading = document.getElementById('loadingEl');
  loading.style.display = 'none';

  if (filtered.length === 0) {
    grid.style.display  = 'none';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  grid.style.display  = 'grid';
  grid.innerHTML = filtered.map(v => renderCard(v)).join('');
}

function renderCard(v) {
  const wl       = state.watchLater[v.id] || '';
  const isWatched = !!state.watched[v.id];
  const isFav     = !!state.favorites[v.id];
  const userTags  = state.tags[v.id] || [];
  const note      = state.notes[v.id] || '';
  const dur       = formatDuration(v.duration);
  const thumb     = v.thumbnail || `https://i.ytimg.com/vi/${v.id}/mqdefault.jpg`;
  const ytUrl     = `https://www.youtube.com/watch?v=${v.id}`;

  const plTag = (v.playlists||[]).length > 0
    ? `<div class="playlist-chip">${esc(v.playlists[0].title)}</div>` : '';

  const tagRow = userTags.length > 0
    ? `<div class="tag-row">${userTags.map(t=>`<span class="tag-chip">${esc(t)}</span>`).join('')}</div>` : '';

  const noteEl = note
    ? `<div class="note-preview">📝 ${esc(note)}</div>` : '';

  const wlBadge = wl
    ? `<div class="watch-later-badge ${wl}">${wl==='low'?'低優先度':wl==='medium'?'中優先度':'高優先度'}</div>` : '';

  const wlLabel = {low:'低優先度',medium:'中優先度',high:'高優先度'};

  return `
    <div class="video-card" id="card-${esc(v.id)}">
      <div class="thumb-wrap" onclick="openYT('${esc(v.id)}')">
        <img class="thumb-img" src="${esc(thumb)}" alt="${esc(v.title)}" loading="lazy"
          onerror="this.src='https://i.ytimg.com/vi/${esc(v.id)}/mqdefault.jpg'">
        <div class="thumb-overlay"><div class="play-icon">▶</div></div>
        ${dur ? `<div class="duration-badge">${esc(dur)}</div>` : ''}
        ${wlBadge}
      </div>
      <div class="card-body">
        <div class="video-title">${esc(v.title)}</div>
        <div class="video-meta">
          <span><span class="meta-icon">👁</span>${formatViews(v.viewCount)}</span>
          <span><span class="meta-icon">📅</span>${formatDate(v.publishedAt)}</span>
        </div>
        ${plTag}
        ${tagRow}
        ${noteEl}
        <div class="card-actions">
          <button class="action-btn ${isFav?'fav-on':''}" onclick="toggleFav('${esc(v.id)}')"
            title="${isFav?'お気に入り解除':'お気に入りに追加'}">
            ${isFav?'❤️':'🤍'} お気に入り
          </button>
          <button class="action-btn ${isWatched?'watch-on':''}" onclick="toggleWatched('${esc(v.id)}')"
            title="${isWatched?'視聴済を解除':'視聴済にする'}">
            ${isWatched?'✅':'☐'} 視聴済
          </button>
        </div>
        <div class="card-actions">
          <select class="wl-select ${wl?'wl-set':''}" onchange="setWatchLater('${esc(v.id)}',this.value)"
            title="あとで見る優先度">
            <option value=""     ${!wl?'selected':''}>⏱ あとで見る</option>
            <option value="low"    ${wl==='low'?'selected':''}>低優先度</option>
            <option value="medium" ${wl==='medium'?'selected':''}>中優先度</option>
            <option value="high"   ${wl==='high'?'selected':''}>高優先度</option>
          </select>
          <button class="action-btn ${note||userTags.length?'watch-on':''}"
            onclick="openModal('${esc(v.id)}')" title="メモ・タグを編集">
            📝 メモ
          </button>
        </div>
      </div>
    </div>`;
}

// ─── Actions ──────────────────────────────────────────────────────────────────
function setTab(id) {
  state.activeTab = id;
  render();
}

function setMode(mode) {
  state.searchMode = mode;
  document.getElementById('andBtn').classList.toggle('active', mode==='AND');
  document.getElementById('orBtn').classList.toggle('active',  mode==='OR');
  render();
}

function openYT(id) {
  window.open(`https://www.youtube.com/watch?v=${id}`, '_blank');
}

function toggleWatched(id) {
  if (state.watched[id]) delete state.watched[id];
  else state.watched[id] = true;
  saveState();
  render();
}

function toggleFav(id) {
  if (state.favorites[id]) delete state.favorites[id];
  else state.favorites[id] = true;
  saveState();
  render();
}

function setWatchLater(id, val) {
  if (val) state.watchLater[id] = val;
  else     delete state.watchLater[id];
  saveState();
  // Re-render just this card's badge
  const card = document.getElementById('card-' + id);
  if (card) {
    const v = videos.find(v => v.id === id);
    if (v) card.outerHTML = renderCard(v);
  }
}

// ─── Modal ────────────────────────────────────────────────────────────────────
function openModal(id) {
  const v = videos.find(v => v.id === id);
  if (!v) return;
  modalVideoId = id;
  document.getElementById('modalTitle').textContent = v.title;
  document.getElementById('noteInput').value  = state.notes[id] || '';
  document.getElementById('tagInput').value   = (state.tags[id] || []).join(' ');
  document.getElementById('modalOverlay').style.display = 'flex';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').style.display = 'none';
  modalVideoId = null;
}

function saveNoteAndTags() {
  if (!modalVideoId) return;
  const note = document.getElementById('noteInput').value.trim();
  const tags = document.getElementById('tagInput').value.trim().split(/\s+/).filter(Boolean);

  if (note)          state.notes[modalVideoId] = note;
  else               delete state.notes[modalVideoId];

  if (tags.length)   state.tags[modalVideoId]  = tags;
  else               delete state.tags[modalVideoId];

  saveState();
  document.getElementById('modalOverlay').style.display = 'none';
  modalVideoId = null;
  render();
}

// ─── Year filter population ───────────────────────────────────────────────────
function populateYearFilter() {
  const years = [...new Set(videos.map(v => new Date(v.publishedAt).getFullYear()))]
    .filter(Boolean).sort((a,b) => b - a);
  const sel = document.getElementById('yearFilter');
  years.forEach(y => {
    const o = document.createElement('option');
    o.value = y;
    o.textContent = y + '年';
    sel.appendChild(o);
  });
}

// ─── Search ───────────────────────────────────────────────────────────────────
let searchTimer;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    state.searchQuery = e.target.value;
    render();
  }, 200);
});

// Close modal on overlay click
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

// Close modal on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('modalOverlay').style.display = 'none';
});

// ─── Init ─────────────────────────────────────────────────────────────────────
(async () => {
  loadState();
  await loadData();

  const noBanner = document.getElementById('noBanner');
  if (videos.length === 0) {
    document.getElementById('loadingEl').style.display = 'none';
    noBanner.style.display = 'block';
    renderTabs();
    renderProgress();
    return;
  }

  populateYearFilter();
  render();
})();
</script>
</body>
</html>
